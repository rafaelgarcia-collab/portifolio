turmas = JSON.parse(dadosSalvos);
}


/* =========================
   MOSTRAR TURMA
========================= */

function mostrarTurma(nomeTurma){

document.getElementById("boas-vindas").style.display="none";
document.getElementById("turma-detalhes").style.display="block";

const alunos = turmas[nomeTurma];
const lista = document.getElementById("lista-alunos");

document.getElementById("titulo-turma").innerText =
"Portfólios da Turma " + nomeTurma.replace("A","° A").replace("B","° B");

document.getElementById("total-alunos").innerText = alunos.length;

lista.innerHTML="";

/* CONTADOR */
const entregues = alunos.filter(a => a.status === "entregue").length;
const pendentes = alunos.length - entregues;

document.getElementById("resumo-status").innerHTML =
`✅ Entregues: ${entregues} | ⏳ Pendentes: ${pendentes}`;

/* LISTA */
alunos.forEach((aluno, index)=>{

let classe = aluno.status==="entregue"
? "status-entregue"
: "status-pendente";

let texto = aluno.status==="entregue"
? "Entregue"
: "Pendente";

lista.innerHTML += `
<div class="card-aluno" onclick="toggleStatus(${index}, '${nomeTurma}')">
<div class="status-folder ${classe}"></div>
<span>${aluno.nome}</span>
<span class="text-status">${texto}</span>
<a href="${aluno.link}" target="_blank" class="link-aluno">Abrir</a>
</div>
`;

});

atualizarBotao(nomeTurma);
}


/* =========================
   TROCAR STATUS
========================= */

function toggleStatus(index, turma){

let aluno = turmas[turma][index];

aluno.status = aluno.status === "entregue"
? "pendente"
: "entregue";

/* SALVAR */
localStorage.setItem("turmas", JSON.stringify(turmas));

mostrarTurma(turma);
}


/* =========================
BOTÃO ATIVO
========================= */

function atualizarBotao(turma){

document.querySelectorAll("nav button").forEach(btn=>{
btn.classList.remove("active");
});

document.getElementById("btn-"+turma).classList.add("active");

}


/* =========================
PESQUISA
========================= */

function filtrarAluno(){

let texto = document.getElementById("pesquisa").value.toLowerCase();
let cards = document.querySelectorAll(".card-aluno");

cards.forEach(card=>{

let nome = card.innerText.toLowerCase();

if(nome.includes(texto)){
card.style.display="flex";
}else{
card.style.display="none";
}

});

}


/* =========================
TEMA (SALVO)
========================= */

function alternarTema(){

document.body.classList.toggle("dark-mode");

const modoEscuro = document.body.classList.contains("dark-mode");

localStorage.setItem("tema", modoEscuro);

document.getElementById("btn-tema").innerHTML =
modoEscuro ? "☀️ Claro" : "🌙 Escuro";

}

window.onload = () => {

/* carregar tema */
if(localStorage.getItem("tema") === "true"){
document.body.classList.add("dark-mode");
document.getElementById("btn-tema").innerHTML = "☀️ Claro";
}

};
